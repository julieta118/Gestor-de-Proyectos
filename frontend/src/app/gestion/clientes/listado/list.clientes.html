<h2>LISTADO DE CLIENTES</h2>

<p-table [value]="clientes">
  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Estado</th>
      <th>Acción</th>
      
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-cliente>
    <tr>
      <td>{{ cliente.id }}</td>
      <td>{{ cliente.nombre }}</td>
      <td>{{ cliente.estado }}</td>
      <td>
        <button pButton type="button" label="Editar" icon="pi pi-pencil" (click)="editarCliente(cliente)"></button>
      </td>
    </tr>
  </ng-template>
</p-table>

<button pButton type="button" label="Crear Cliente" icon="pi pi-plus" (click)="crearCliente()"></button>


<p-dialog header="{{ clienteSeleccionado ? 'Editar cliente' : 'Crear cliente' }}"
          [(visible)]="visible"
          (onHide)="cerrarDialog()">
  <app-gestion-cliente [clienteSeleccionado]="clienteSeleccionado"
                       (cerrar)="cerrarDialog()">
  </app-gestion-cliente>
</p-dialog>

<div class ="footer">
  <footer>
    <p>&copy; 2026 Sistema de Gestión de Proyectos. Todos los derechos reservados.</p>
  </footer>
</div>
