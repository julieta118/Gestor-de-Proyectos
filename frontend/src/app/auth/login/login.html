<div class="login-container">
  <h2>Sistema de Gestión de Proyectos</h2>
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <i class="pi pi-users" style="font-size: 2rem; color: #3498db"></i>
    <form (ngSubmit)="iniciarSesion()">
      <label for="nombre">Usuario</label>
      <input id="nombre" [(ngModel)]="nombre" name="nombre" required />

      <label for="clave">Contraseña</label>
      <input id="clave" type="password" [(ngModel)]="clave" name="clave" required />

      <button pButton type="submit" icon="pi pi-sign-in">Entrar</button>
    </form>
  </div>
</div>
